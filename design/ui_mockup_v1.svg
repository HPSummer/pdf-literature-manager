  <rect x="1150" y="392" width="328" height="6" rx="3" fill="#f59e0b"/>
  <text x="1150" y="434" class="body ink" font-weight="700">低推力轨迹优化方法研究</text>
  <text x="1150" y="468" class="small muted">张三 · 2024 · 哈尔滨工业大学</text>
  <text x="1150" y="498" class="small muted">类型：博士学位论文  置信度：0.81</text>
  <line x1="1150" y1="524" x2="1478" y2="524" stroke="#d9e2ec"/>
  <text x="1150" y="560" class="section ink">复核原因</text>
  <rect x="1150" y="578" width="328" height="92" rx="10" fill="#fffaf0" stroke="#f6e6bc"/>
  <text x="1170" y="610" class="small" fill="#8a5a00">缺少地点；OCR 已提取题名和学校。</text>
  <text x="1170" y="642" class="small" fill="#8a5a00">建议确认导师与授予地点后导出 Zotero。</text>

