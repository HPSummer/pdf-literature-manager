  <text x="1314" y="758" text-anchor="middle" class="small" fill="#fff">复核编辑</text>
  <rect x="1150" y="784" width="158" height="40" class="button" fill="#ecfdf3" stroke="#b7ead0"/>
  <text x="1229" y="811" text-anchor="middle" class="small" fill="#087443">AI 粗读/精读</text>
  <rect x="1320" y="784" width="158" height="40" class="button" fill="#eef4ff" stroke="#bdd4ff"/>
  <text x="1399" y="811" text-anchor="middle" class="small" fill="#1f6feb">Zotero 检查</text>
  <rect x="1150" y="846" width="328" height="56" rx="10" fill="#f8fafc" stroke="#d9e2ec"/>
