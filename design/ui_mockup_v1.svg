    <rect x="272" y="8" width="60" height="28" class="button" fill="#fff" stroke="#d9e2ec"/><text x="302" y="28" text-anchor="middle" class="tiny muted">撤销</text>
    <rect x="340" y="8" width="78" height="28" class="button" fill="#fff" stroke="#d9e2ec"/><text x="379" y="28" text-anchor="middle" class="tiny muted">输出目录</text>

