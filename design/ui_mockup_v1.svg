  <text x="76" y="484" class="tiny muted">状态</text>
  <text x="150" y="484" class="tiny muted">文件名</text>
  <text x="360" y="484" class="tiny muted">类型</text>
  <text x="452" y="484" class="tiny muted">置信度</text>
  <text x="550" y="484" class="tiny muted">标题</text>
  <text x="830" y="484" class="tiny muted">DOI / arXiv</text>
  <text x="952" y="484" class="tiny muted">GB/T 文件名</text>

  <g class="tiny">
    <rect x="56" y="508" width="1016" height="54" fill="#ffffff" stroke="#edf2f7"/>
    <circle cx="82" cy="535" r="8" fill="#12b76a"/><text x="108" y="542" class="ink">wang2025_dragfree.pdf</text>
    <text x="360" y="542" fill="#087443">论文</text><text x="464" y="542" class="muted">0.92</text>
    <text x="550" y="542" class="ink">Adaptive Control for Test Mass Capture...</text>
    <text x="830" y="542" class="muted mono">10.1109/TAES...</text><text x="952" y="542" class="muted">Wang 等. Adaptive Control...</text>

    <rect x="56" y="562" width="1016" height="54" fill="#fffaf0" stroke="#f6e6bc"/>
