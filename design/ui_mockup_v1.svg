    <text x="360" y="596" fill="#b7791f">学位论文</text><text x="464" y="596" class="muted">0.81</text>
    <text x="550" y="596" class="ink">低推力轨迹优化方法研究</text>
    <text x="830" y="596" class="muted">无 DOI</text><text x="952" y="596" class="muted">张三. 低推力轨迹优化...</text>

    <rect x="56" y="616" width="1016" height="54" fill="#ffffff" stroke="#edf2f7"/>
    <circle cx="82" cy="643" r="8" fill="#12b76a"/><text x="108" y="650" class="ink">rtbp_global_optimization.pdf</text>
    <text x="360" y="650" fill="#087443">论文</text><text x="464" y="650" class="muted">0.88</text>
    <text x="550" y="650" class="ink">Global Optimization in Restricted Three Body...</text>
    <text x="830" y="650" class="muted mono">arXiv:2601...</text><text x="952" y="650" class="muted">Li 等. Global Optimization...</text>

    <rect x="56" y="670" width="1016" height="54" fill="#f8fbff" stroke="#edf2f7"/>
    <circle cx="82" cy="697" r="8" fill="#1f6feb"/><text x="108" y="704" class="ink">扫描版硕士论文.pdf</text>
    <text x="360" y="704" fill="#1f6feb">OCR</text><text x="464" y="704" class="muted">0.73</text>
    <text x="550" y="704" class="ink">小推力转移轨道快速设计...</text>
    <text x="830" y="704" class="muted">OCR 文本</text><text x="952" y="704" class="muted">待确认学校/地点</text>
  </g>

  <!-- Right inspector -->
  <rect x="1120" y="330" width="388" height="604" rx="14" class="surface" filter="url(#shadow)"/>
