    <rect x="712" y="8" width="72" height="28" class="button" fill="#fff" stroke="#d9e2ec"/><text x="748" y="28" text-anchor="middle" class="tiny muted">重复合并</text>
    <rect x="792" y="8" width="68" height="28" class="button" fill="#ecfdf3" stroke="#b7ead0"/><text x="826" y="28" text-anchor="middle" class="tiny" fill="#087443">AI 阅读</text>
    <rect x="868" y="8" width="78" height="28" class="button" fill="#eef4ff" stroke="#bdd4ff"/><text x="907" y="28" text-anchor="middle" class="tiny" fill="#1f6feb">Zotero</text>
  </g>

  <!-- table header -->
