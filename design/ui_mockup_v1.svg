<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#101828" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg{fill:#f4f7fb}
      .surface{fill:#ffffff}
      .soft{fill:#f8fafc}
      .line{stroke:#d9e2ec;stroke-width:1}
      .ink{fill:#162033;font-family:"Microsoft YaHei UI","Segoe UI",Arial,sans-serif}
      .muted{fill:#667085;font-family:"Microsoft YaHei UI","Segoe UI",Arial,sans-serif}
      .tiny{font-size:18px}
      .small{font-size:20px}
      .body{font-size:22px}
      .title{font-size:32px;font-weight:700}
      .section{font-size:20px;font-weight:700}
      .button{rx:8;ry:8}
      .pill{rx:18;ry:18}
      .mono{font-family:"Consolas","Segoe UI",monospace}
    </style>
  </defs>

  <rect class="bg" width="1536" height="1024"/>

  <!-- Top app shell -->
  <rect x="28" y="24" width="1480" height="92" rx="14" fill="#111827"/>
  <circle cx="78" cy="70" r="26" fill="#1f6feb"/>
  <rect x="67" y="54" width="25" height="33" rx="2" fill="#fff"/>
  <path d="M84 54 L92 62 L84 62 Z" fill="#dbeafe"/>
  <text x="62" y="100" class="tiny" fill="#cfe1ff">PDF</text>
  <text x="124" y="65" class="title" fill="#fff">PDF 文献管理器</text>
  <text x="124" y="96" class="small" fill="#c7d2e5">扫描、国标命名、Zotero / Obsidian 导出、AI 粗读与复核工作台</text>

  <!-- summary boxes -->
  <g transform="translate(1068 43)">
    <rect width="92" height="54" rx="10" fill="#243042"/>
    <text x="46" y="25" text-anchor="middle" class="section" fill="#fff">128</text>
    <text x="46" y="45" text-anchor="middle" class="tiny" fill="#aebacf">PDF</text>
    <rect x="104" width="92" height="54" rx="10" fill="#243042"/>
    <text x="150" y="25" text-anchor="middle" class="section" fill="#fff">96</text>
    <text x="150" y="45" text-anchor="middle" class="tiny" fill="#aebacf">论文</text>
    <rect x="208" width="92" height="54" rx="10" fill="#3a2f15"/>
    <text x="254" y="25" text-anchor="middle" class="section" fill="#fff">11</text>
    <text x="254" y="45" text-anchor="middle" class="tiny" fill="#f4d492">复核</text>
    <rect x="312" width="92" height="54" rx="10" fill="#3b1f24"/>
    <text x="358" y="25" text-anchor="middle" class="section" fill="#fff">2</text>
    <text x="358" y="45" text-anchor="middle" class="tiny" fill="#ffc9c9">失败</text>
  </g>

  <!-- Scan command panel -->
  <rect x="28" y="136" width="1480" height="174" rx="14" class="surface" filter="url(#shadow)"/>
  <text x="56" y="177" class="section ink">扫描与配置</text>
  <rect x="56" y="196" width="860" height="42" rx="8" fill="#f8fafc" stroke="#d9e2ec"/>
  <text x="76" y="224" class="small muted">F:\Research\PDFs\trajectory_optimization</text>
  <rect x="930" y="196" width="124" height="42" class="button" fill="#eef4ff" stroke="#bdd4ff"/>
  <text x="992" y="224" text-anchor="middle" class="small" fill="#1f6feb">选择文件夹</text>
  <rect x="1068" y="196" width="132" height="42" class="button" fill="#1f6feb"/>
  <text x="1134" y="224" text-anchor="middle" class="small" fill="#fff">开始扫描</text>
  <rect x="1216" y="196" width="118" height="42" class="button" fill="#f8fafc" stroke="#d9e2ec"/>
  <text x="1275" y="224" text-anchor="middle" class="small muted">GB/T 7714</text>
  <rect x="1350" y="196" width="130" height="42" class="button" fill="#ecfdf3" stroke="#b7ead0"/>
  <text x="1415" y="224" text-anchor="middle" class="small" fill="#087443">OCR 兜底</text>

  <g transform="translate(56 258)">
    <rect width="120" height="28" class="pill" fill="#f1f5f9"/><text x="60" y="20" text-anchor="middle" class="tiny muted">递归子目录</text>
    <rect x="134" width="164" height="28" class="pill" fill="#f1f5f9"/><text x="216" y="20" text-anchor="middle" class="tiny muted">联网补全 DOI/arXiv</text>
    <rect x="312" width="186" height="28" class="pill" fill="#f1f5f9"/><text x="405" y="20" text-anchor="middle" class="tiny muted">Obsidian 02_literature</text>
    <rect x="512" width="172" height="28" class="pill" fill="#f1f5f9"/><text x="598" y="20" text-anchor="middle" class="tiny muted">AI: gpt-5.4</text>
    <rect x="698" width="236" height="28" class="pill" fill="#f1f5f9"/><text x="816" y="20" text-anchor="middle" class="tiny muted">Zotero Collection: low-thrust</text>
    <rect x="948" width="134" height="28" class="pill" fill="#f1f5f9"/><text x="1015" y="20" text-anchor="middle" class="tiny muted">挂载 PDF</text>
  </g>

  <!-- Main table -->
  <rect x="28" y="330" width="1072" height="604" rx="14" class="surface" filter="url(#shadow)"/>
  <text x="56" y="370" class="section ink">扫描结果</text>
  <text x="176" y="370" class="tiny muted">双击可复核；建议文件名可直接编辑</text>
  <rect x="820" y="344" width="86" height="34" class="button" fill="#f8fafc" stroke="#d9e2ec"/><text x="863" y="367" text-anchor="middle" class="tiny muted">全选</text>
  <rect x="916" y="344" width="118" height="34" class="button" fill="#0f766e"/><text x="975" y="367" text-anchor="middle" class="tiny" fill="#fff">复核编辑</text>
  <rect x="1044" y="344" width="36" height="34" class="button" fill="#1f6feb"/><text x="1062" y="367" text-anchor="middle" class="tiny" fill="#fff">导出</text>

