<!doctype html>
<meta charset="utf-8">
<title>PDF Manager UI Mockups</title>
<style>
  body { margin: 0; font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif; background: #eef2f6; color: #172033; }
  header { padding: 18px 24px; background: #111827; color: white; }
  main { padding: 24px; display: grid; gap: 24px; }
  section { background: white; border: 1px solid #d9e2ec; border-radius: 14px; padding: 16px; box-shadow: 0 10px 24px rgba(16,24,40,.08); }
  h2 { margin: 0 0 12px; font-size: 18px; }
  object { width: 100%; height: auto; aspect-ratio: 1600 / 1040; border: 1px solid #e4e9f2; border-radius: 10px; background: #f8fafc; }
</style>
<header>
  <strong>PDF 文献管理器 UI 视觉稿</strong>
  <span style="opacity:.72;margin-left:12px">v2 更推荐：三栏工作台，更像成熟桌面软件</span>
</header>
<main>
  <section>
    <h2>推荐稿 v2</h2>
    <object data="ui_mockup_v2.svg" type="image/svg+xml"></object>
  </section>
  <section>
    <h2>上一稿 v1</h2>
    <object data="ui_mockup_v1.svg" type="image/svg+xml"></object>
  </section>
</main>
