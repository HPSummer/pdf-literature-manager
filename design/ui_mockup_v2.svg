    <rect x="60" y="55" width="25" height="34" rx="3" fill="#fff"/>
    <path d="M78 55 L85 63 L78 63 Z" fill="#dbeafe"/>
    <text x="108" y="68" class="h2" fill="#fff">PDF 文献</text>
    <text x="108" y="92" class="xs" fill="#b8c4d8">Literature Workbench</text>

    <rect x="42" y="140" width="176" height="44" rx="10" fill="#243042"/>
