      <rect x="306" y="758" width="5" height="58" rx="3" fill="#d92d20"/>
      <text x="326" y="794" fill="#b42318">失败</text><text x="394" y="794" class="ink">encrypted_manual.pdf</text>
      <text x="574" y="794" class="muted">PDF</text><text x="650" y="794" class="ink">加密文件，需手动处理</text>
      <text x="910" y="794" class="muted">不导入</text>
