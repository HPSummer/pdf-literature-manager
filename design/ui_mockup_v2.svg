    <text x="62" y="895" font-size="38" font-weight="760" fill="#fff">128</text>
    <text x="126" y="895" class="small" fill="#aebacf">PDF</text>
    <text x="62" y="928" class="xs" fill="#8fb3ff">96 可导入 · 11 待复核</text>
