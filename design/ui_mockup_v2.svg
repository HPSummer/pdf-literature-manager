      <circle cx="64" cy="276" r="6"/><text x="88" y="282" class="body">重复合并</text>
      <circle cx="64" cy="331" r="6"/><text x="88" y="337" class="body">AI 阅读</text>
      <circle cx="64" cy="386" r="6"/><text x="88" y="392" class="body">Zotero 导入</text>
