<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#182230" flood-opacity="0.10"/>
    </filter>
    <filter id="microShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#182230" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="navGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#152033"/>
      <stop offset="100%" stop-color="#101828"/>
    </linearGradient>
    <style>
      .font{font-family:"Microsoft YaHei UI","Segoe UI",Arial,sans-serif}
      .mono{font-family:"Cascadia Mono","Consolas",monospace}
      .bg{fill:#f5f7fb}
      .surface{fill:#fff}
      .soft{fill:#f8fafc}
      .line{stroke:#d9e2ec;stroke-width:1}
      .ink{fill:#172033}
      .muted{fill:#667085}
      .faint{fill:#98a2b3}
      .blue{fill:#1f6feb}
      .teal{fill:#0f766e}
      .amber{fill:#f59e0b}
      .red{fill:#d92d20}
      .h1{font-size:30px;font-weight:750}
      .h2{font-size:21px;font-weight:720}
      .body{font-size:18px}
      .small{font-size:15px}
      .xs{font-size:13px}
      .button{rx:8;ry:8}
      .pill{rx:999;ry:999}
    </style>
  </defs>

  <rect class="bg" width="1600" height="1040"/>

  <!-- App frame -->
  <rect x="22" y="20" width="1556" height="994" rx="18" class="surface" filter="url(#softShadow)"/>

